<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0b0e14"/>
  <g fill="none" stroke="#10b981" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round">
    <!-- outer hex nest -->
    <polygon points="32,13 50,23 50,41 32,51 14,41 14,23"/>
    <!-- inner hex -->
    <polygon points="32,22 42,27.5 42,36.5 32,42 22,36.5 22,27.5"/>
    <!-- edges out to the three peer nodes -->
    <line x1="50" y1="23" x2="55" y2="18"/>
    <line x1="14" y1="23" x2="9" y2="18"/>
    <line x1="32" y1="51" x2="32" y2="57"/>
    <!-- peer node rings -->
    <circle cx="56.5" cy="16.5" r="3.2"/>
    <circle cx="7.5" cy="16.5" r="3.2"/>
    <circle cx="32" cy="59" r="3.2"/>
  </g>
  <!-- central node -->
  <circle cx="32" cy="32" r="5" fill="#34d399"/>
</svg>
