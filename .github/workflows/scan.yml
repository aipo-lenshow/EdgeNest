name: privacy-scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan tree for RFC1918 / personal identifiers / token-shaped strings
        shell: bash
        run: |
          set -euo pipefail
          ALLOWLIST_RE='^(scripts/hooks/pre-commit|\.github/workflows/scan\.yml)$'
          mapfile -t FILES < <(git ls-files | grep -Ev "$ALLOWLIST_RE")
          RFC1918='(\b192\.168\.[0-9]{1,3}\.[0-9]{1,3}\b|\b10\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\b|\b172\.(1[6-9]|2[0-9]|3[0-1])\.[0-9]{1,3}\.[0-9]{1,3}\b)'
          TOKEN='[A-Za-z0-9_-]{40,}'
          PERSONAL_LENSHOW='(^|[^a-z-])lenshow([^a-z.]|$)'
          PRIVATE_HOSTS='(\baipo-dev\b|\bZ423\b)'
          FAIL=0
          report() { FAIL=1; printf '%s\n' "$1"; }

          for f in "${FILES[@]}"; do
            [ -f "$f" ] || continue
            if file "$f" 2>/dev/null | grep -q 'binary'; then continue; fi

            # Test fixtures (Go *_test.go, TS *.test.*, *.spec.*) carry
            # synthetic Reality keys / WARP endpoints / CIDR examples —
            # exclude them from RFC1918 + TOKEN scans. Personal/hostname
            # checks below still apply (no legit reason for those in tests).
            is_test=0
            case "$f" in
              *_test.go|*.test.ts|*.test.tsx|*.spec.ts|*.spec.tsx) is_test=1 ;;
            esac

            if [ "$is_test" -eq 0 ]; then
              if hits=$(grep -nE "$RFC1918" "$f" 2>/dev/null); then
                report "::error file=$f::RFC1918 IP literal:"
                echo "$hits"
              fi
            fi

            case "$f" in
              go.sum|go.mod|web/package-lock.json|web/package.json) ;;
              *)
                if [ "$is_test" -eq 0 ]; then
                  if hits=$(grep -nE "$TOKEN" "$f" 2>/dev/null \
                            | grep -Ev '(commit|sha|hash|h1:|sha256-|integrity|resolved)' \
                            | grep -Ev 'go\.sum|test-fixture' \
                            | grep -Ev '^[0-9]+:[[:space:]]*[#/*-]+[[:space:]]*-{4,}[[:space:]]*[#/*-]*[[:space:]]*$' ); then
                    if [ -n "$hits" ]; then
                      report "::error file=$f::Token-shaped string (40+ chars):"
                      echo "$hits"
                    fi
                  fi
                fi
                ;;
            esac

            if hits=$(grep -nE "$PERSONAL_LENSHOW" "$f" 2>/dev/null | grep -vE 'aipo-lenshow|ailenshow'); then
              if [ -n "$hits" ]; then
                report "::error file=$f::Personal identifier 'lenshow':"
                echo "$hits"
              fi
            fi

            if hits=$(grep -nE "$PRIVATE_HOSTS" "$f" 2>/dev/null); then
              report "::error file=$f::Private host name:"
              echo "$hits"
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo
            echo "Privacy scan failed."
            exit 1
          fi
